<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ATS Genius | Premium NLP Analyzer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.min.js"></script>
    <style>
        :root {
            --primary: #6e8efb;
            --secondary: #a777e3;
            --bg-dark: #0f0c29;
            --glass: rgba(255, 255, 255, 0.1);
        }

        /* --- PARALLAX ENGINE --- */
        body, html {
            margin: 0; padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: white;
            overflow-x: hidden;
        }

        .parallax-wrapper {
            perspective: 1px; /* Required for 3D depth effect */
            height: 100vh;
            overflow-y: auto;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        .background-layer {
            position: absolute;
            top: 0; right: 0; bottom: 0; left: 0;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            transform: translateZ(-1px) scale(2); /* Slower movement */
            z-index: -1;
        }

        /* --- UI COMPONENTS --- */
        .content-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(to right, #fff, #a777e3);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .tagline { color: #888; margin-bottom: 30px; font-size: 0.9rem; }

        input[type="file"] { margin-bottom: 20px; font-size: 0.8rem; color: #ccc; }

        textarea {
            width: 100%; height: 120px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: white;
            padding: 15px;
            margin-bottom: 20px;
            resize: none;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 10px;
            background: #1a1a3a;
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            color: white;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(110, 142, 251, 0.3);
        }

        /* --- RESULTS SECTION --- */
        .score-section { margin-top: 30px; }

        .progress-container {
            width: 100%; height: 12px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        #progress {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #43cea2, #185a9d);
            transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        #missingList {
            text-align: left;
            color: #ff8a80;
            padding-left: 20px;
            font-size: 0.9rem;
        }

        #missingList li { margin-bottom: 5px; }
    </style>
</head>
<body>

<div class="parallax-wrapper">
    <div class="background-layer"></div>
    <div class="content-container">
        <div class="glass-card">
            <h1>ATS Genius</h1>
            <p class="tagline">Advanced Semantic Context Analysis</p>
            
            <input type="file" id="pdfUpload" accept=".pdf">
            
            <textarea id="resumeInput" placeholder="Upload a PDF to extract technical context..."></textarea>
            
            <select id="jobRole">
                <option value="ai">AI Engineer (ML Specialist)</option>
                <option value="frontend">Frontend Developer</option>
                <option value="data">Data Analyst</option>
            </select>
            
            <button id="analyzeBtn" onclick="analyze()">Analyze Now</button>
            
            <div class="score-section">
                <h2>Score: <span id="scoreDisplay">0%</span></h2>
                <div class="progress-container">
                    <div id="progress"></div>
                </div>
                <ul id="missingList"></ul>
            </div>
        </div>
    </div>
</div>

<script>
    // Flag to ensure the NLP logic waits for complete extraction
    let textIsReady = false;

    /**
     * Sends the extracted text to the Python Intensity Scorer
     */
    async function analyze() {
        const text = document.getElementById("resumeInput").value;
        const role = document.getElementById("jobRole").value;
        const list = document.getElementById("missingList");
        const scoreDisplay = document.getElementById("scoreDisplay");
        const progressBar = document.getElementById("progress");

        // VALIDATION: Block empty or incomplete analysis
        if(!textIsReady || text.length < 50) {
            return alert("Wait! The technical context is still loading from the PDF.");
        }

        scoreDisplay.innerText = "Analyzing Context...";

        try {
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ text: text, role: role })
            });

            const data = await response.json();

            if (data && typeof data.score !== 'undefined') {
                // Update Score
                scoreDisplay.innerText = data.score + "%";
                progressBar.style.width = data.score + "%";

                // Update Missing Skills List
                list.innerHTML = "";
                if(data.missing && data.missing.length > 0) {
                    data.missing.forEach(skill => {
                        const li = document.createElement("li");
                        li.textContent = "• Missing: " + skill;
                        list.appendChild(li);
                    });
                } else {
                    list.innerHTML = "<li style='color:#43cea2'>✔ Strong technical match found!</li>";
                }
            }
        } catch (err) {
            scoreDisplay.innerText = "Network Error";
            console.error(err);
        }
    }

    /**
     * Sequential PDF Extraction: Captures context from all pages
     */
    document.getElementById("pdfUpload").addEventListener("change", e => {
        const file = e.target.files[0];
        const reader = new FileReader();
        const inputField = document.getElementById("resumeInput");
        
        inputField.value = "Extracting technical data... please wait.";
        textIsReady = false; 
        
        reader.onload = async function() {
            const arr = new Uint8Array(this.result);
            // Configure worker source
            pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.14.305/pdf.worker.min.js';
            
            try {
                const pdf = await pdfjsLib.getDocument(arr).promise;
                let fullText = "";
                
                // Iterate through pages to build full context
                for(let i=1; i<=pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const content = await page.getTextContent();
                    fullText += content.items.map(item => item.str).join(" ") + " ";
                }
                
                inputField.value = fullText.trim();
                textIsReady = true; // Unlock the analysis button
            } catch (error) {
                inputField.value = "Error reading PDF. Please try again.";
            }
        };
        reader.readAsArrayBuffer(file);
    });
</script>

</body>
</html>
